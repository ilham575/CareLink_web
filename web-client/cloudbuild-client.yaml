# ============================================================
# Cloud Build — CareLink Web Client (React + Firebase Hosting)
# Project: carelink-web-489111
# ============================================================
# วิธีใช้:
#   gcloud builds submit --config=cloudbuild-client.yaml \
#     --substitutions=_API_URL=https://YOUR_SERVER_URL web-client/

substitutions:
  _PROJECT_ID: "carelink-web-489111"
  _API_URL: "https://carelink-server-XXXXX-as.a.run.app"  # แก้หลัง deploy server

steps:
  # -----------------------------------------------------------
  # Step 1: Install npm dependencies
  # -----------------------------------------------------------
  - name: "node:18-alpine"
    id: "npm-install"
    entrypoint: "npm"
    args: ["ci", "--prefer-offline"]
    dir: "web-client"
    env:
      - "CI=false"

  # -----------------------------------------------------------
  # Step 2: Build React app with production API URL
  # -----------------------------------------------------------
  - name: "node:18-alpine"
    id: "npm-build"
    entrypoint: "npm"
    args: ["run", "build"]
    dir: "web-client"
    env:
      - "CI=false"
      - "NODE_ENV=production"
      - "REACT_APP_API_URL=${_API_URL}"
      - "REACT_APP_SOCKET_URL=${_API_URL}"
      - "REACT_APP_NAME=CareLink"
      - "REACT_APP_TELEGRAM_BOT_NAME=carelink2_bot"
    waitFor: ["npm-install"]

  # -----------------------------------------------------------
  # Step 3: Deploy to Firebase Hosting
  # -----------------------------------------------------------
  - name: "node:18-alpine"
    id: "firebase-deploy"
    entrypoint: "sh"
    args:
      - "-c"
      - "npm install -g firebase-tools && firebase deploy --only hosting --project=${_PROJECT_ID} --token=$$FIREBASE_TOKEN"
    dir: "web-client"
    secretEnv: ["FIREBASE_TOKEN"]
    waitFor: ["npm-build"]

availableSecrets:
  secretManager:
    - versionName: "projects/${_PROJECT_ID}/secrets/firebase-token/versions/latest"
      env: "FIREBASE_TOKEN"

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: "E2_HIGHCPU_8"
