# Cloud Build Configuration สำหรับ GCP
# ใช้คำสั่ง: gcloud builds submit --config=cloudbuild.yaml

steps:
  # Step 1: Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-image'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/carelink-strapi:$BUILD_ID'
      - '-t'
      - 'gcr.io/$PROJECT_ID/carelink-strapi:latest'
      - '--build-arg'
      - 'PUBLIC_URL=${_PUBLIC_URL}'
      - '--build-arg'
      - 'STRAPI_ADMIN_BACKEND_URL=${_PUBLIC_URL}'
      - '-f'
      - 'Dockerfile.gcp'
      - '.'

  # Step 2: Push image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-image'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/carelink-strapi:$BUILD_ID'
    waitFor: ['build-image']

  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-latest'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/carelink-strapi:latest'
    waitFor: ['build-image']

  # Step 3: Run database migrations (optional - can fail without blocking deployment)
  - name: 'gcr.io/cloud-builders/docker'
    id: 'run-migrations'
    args:
      - 'run'
      - '--rm'
      - '--env'
      - 'NODE_ENV=production'
      - '--env'
      - 'DATABASE_CLIENT=${_DATABASE_CLIENT}'
      - '--env'
      - 'DATABASE_HOST=${_DATABASE_HOST}'
      - '--env'
      - 'DATABASE_PORT=${_DATABASE_PORT}'
      - '--env'
      - 'DATABASE_NAME=${_DATABASE_NAME}'
      - '--env'
      - 'DATABASE_USERNAME=${_DATABASE_USERNAME}'
      - '--env'
      - 'DATABASE_PASSWORD=${_DATABASE_PASSWORD}'
      - 'gcr.io/$PROJECT_ID/carelink-strapi:$BUILD_ID'
      - 'sh'
      - '-c'
      - 'npm run db:migrate || true'
    waitFor: ['push-latest']
    allowFailure: true

  # Step 4: Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
    id: 'deploy-cloud-run'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        cat > env.yaml <<EOF
        NODE_ENV: "production"
        DATABASE_CLIENT: "${_DATABASE_CLIENT}"
        DATABASE_HOST: "/cloudsql/${_CLOUDSQL_INSTANCE}"
        DATABASE_PORT: "${_DATABASE_PORT}"
        DATABASE_NAME: "${_DATABASE_NAME}"
        DATABASE_USERNAME: "${_DATABASE_USERNAME}"
        DATABASE_PASSWORD: "${_DATABASE_PASSWORD}"
        ADMIN_JWT_SECRET: "${_ADMIN_JWT_SECRET}"
        JWT_SECRET: "${_JWT_SECRET}"
        API_TOKEN_SALT: "${_API_TOKEN_SALT}"
        TRANSFER_TOKEN_SALT: "${_TRANSFER_TOKEN_SALT}"
        STRAPI_URL: "${_STRAPI_URL}"
        PUBLIC_URL: "${_PUBLIC_URL}"
        URL: "${_PUBLIC_URL}"
        INSTANCE_CONNECTION_NAME: "${_CLOUDSQL_INSTANCE}"
        APP_KEYS: "${_APP_KEYS}"
        ENCRYPTION_KEY: "${_ENCRYPTION_KEY}"
        SOCKET_ALLOWED_ORIGINS: "${_SOCKET_ALLOWED_ORIGINS}"
        EOF

        gcloud run deploy carelink-strapi \
          --image gcr.io/$PROJECT_ID/carelink-strapi:$BUILD_ID \
          --platform managed \
          --region ${_CLOUD_RUN_REGION} \
          --port 1337 \
          --cpu 2 \
          --memory 2Gi \
          --timeout 3600 \
          --env-vars-file env.yaml \
          --add-cloudsql-instances ${_CLOUDSQL_INSTANCE} \
          --allow-unauthenticated
    waitFor: ['push-latest', 'run-migrations']

# Images to push
images:
  - 'gcr.io/$PROJECT_ID/carelink-strapi:$BUILD_ID'
  - 'gcr.io/$PROJECT_ID/carelink-strapi:latest'

