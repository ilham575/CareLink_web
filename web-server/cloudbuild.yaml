# Cloud Build Configuration สำหรับ Strapi + Cloud SQL (PostgreSQL) + VPC
# ใช้คำสั่ง: gcloud builds submit --config=cloudbuild.yaml

steps:
  # -----------------------------------------------------------------------------
  # Step 1: Build Docker image
  # -----------------------------------------------------------------------------
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-image'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/carelink-strapi:$BUILD_ID'
      - '-t'
      - 'gcr.io/$PROJECT_ID/carelink-strapi:latest'
      - '--build-arg'
      - 'PUBLIC_URL=${_PUBLIC_URL}'
      - '--build-arg'
      - 'STRAPI_ADMIN_BACKEND_URL=${_PUBLIC_URL}'
      - '-f'
      - 'Dockerfile'
      - '.'

  # -----------------------------------------------------------------------------
  # Step 2: Push image to Container Registry
  # -----------------------------------------------------------------------------
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-image'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/carelink-strapi:$BUILD_ID'
    waitFor: ['build-image']

  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-latest'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/carelink-strapi:latest'
    waitFor: ['build-image']

  # -----------------------------------------------------------------------------
  # Step 3: Run database migrations (เก็บไว้ตามคำขอ)
  # -----------------------------------------------------------------------------
  - name: 'gcr.io/cloud-builders/docker'
    id: 'run-migrations'
    args:
      - 'run'
      - '--rm'
      - '--env'
      - 'NODE_ENV=production'
      - '--env'
      - 'DATABASE_CLIENT=${_DATABASE_CLIENT}'
      - '--env'
      - 'DATABASE_HOST=${_DATABASE_PRIVATE_IP}'  # ยิงไปที่ Private IP
      - '--env'
      - 'DATABASE_PORT=${_DATABASE_PORT}'
      - '--env'
      - 'DATABASE_NAME=${_DATABASE_NAME}'
      - '--env'
      - 'DATABASE_USERNAME=${_DATABASE_USERNAME}'
      - '--env'
      - 'DATABASE_PASSWORD=${_DATABASE_PASSWORD}'
      - '--env'
      - 'DATABASE_SSL=false' # ใน VPC ไม่ต้องใช้ SSL (หรือถ้าเปิด Database.js ก็รองรับแล้ว)
      - 'gcr.io/$PROJECT_ID/carelink-strapi:$BUILD_ID'
      - 'sh'
      - '-c'
      - 'npm run db:migrate || true' # allow failure เพื่อไม่ให้ขัด Deploy
    waitFor: ['push-latest']
    allowFailure: true

  # -----------------------------------------------------------------------------
  # Step 4: Deploy to Cloud Run (Config for VPC + GCS)
  # -----------------------------------------------------------------------------
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
    id: 'deploy-cloud-run'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        # สร้างไฟล์ env.yaml สำหรับ Runtime
        # เพิ่ม GCS_BUCKET_NAME เข้าไปแล้ว
        cat > env.yaml <<EOF
        NODE_ENV: "production"
        DATABASE_CLIENT: "${_DATABASE_CLIENT}"
        DATABASE_HOST: "/cloudsql/${_CLOUDSQL_INSTANCE}"
        DATABASE_PORT: "${_DATABASE_PORT}"
        DATABASE_NAME: "${_DATABASE_NAME}"
        DATABASE_USERNAME: "${_DATABASE_USERNAME}"
        DATABASE_PASSWORD: "${_DATABASE_PASSWORD}"
        DATABASE_SSL: "false" 
        GCS_BUCKET_NAME: "${_GCS_BUCKET_NAME}"
        ADMIN_JWT_SECRET: "${_ADMIN_JWT_SECRET}"
        JWT_SECRET: "${_JWT_SECRET}"
        API_TOKEN_SALT: "${_API_TOKEN_SALT}"
        TRANSFER_TOKEN_SALT: "${_TRANSFER_TOKEN_SALT}"
        STRAPI_URL: "${_STRAPI_URL}"
        PUBLIC_URL: "${_PUBLIC_URL}"
        URL: "${_PUBLIC_URL}"
        INSTANCE_CONNECTION_NAME: "${_CLOUDSQL_INSTANCE}"
        APP_KEYS: "${_APP_KEYS}"
        ENCRYPTION_KEY: "${_ENCRYPTION_KEY}"
        SOCKET_ALLOWED_ORIGINS: "${_SOCKET_ALLOWED_ORIGINS}"
        TELEGRAM_TOKEN: "${_TELEGRAM_TOKEN}"
        TELEGRAM_BOT_NAME: "${_TELEGRAM_BOT_NAME}"
        EOF

        # สั่ง Deploy
        gcloud run deploy carelink-strapi \
          --image gcr.io/$PROJECT_ID/carelink-strapi:$BUILD_ID \
          --platform managed \
          --region ${_CLOUD_RUN_REGION} \
          --port 1337 \
          --cpu 2 \
          --memory 2Gi \
          --timeout 3600 \
          --env-vars-file env.yaml \
          --add-cloudsql-instances ${_CLOUDSQL_INSTANCE} \
          --allow-unauthenticated \
          --network default \
          --subnet default \
          --vpc-egress private-ranges-only

    waitFor: ['push-latest', 'run-migrations']

# Images to push
images:
  - 'gcr.io/$PROJECT_ID/carelink-strapi:$BUILD_ID'
  - 'gcr.io/$PROJECT_ID/carelink-strapi:latest'

# Substitutions (ตัวแปร)
substitutions:
  _CLOUD_RUN_REGION: 'asia-southeast1'
  
  # Database Config
  _DATABASE_CLIENT: 'postgres'
  _DATABASE_PORT: '5432'
  _DATABASE_NAME: 'carelink_db'
  _DATABASE_USERNAME: 'postgres'
  _DATABASE_PASSWORD: 'Ihsan53295'
  
  # 📍 Private IP (สำหรับ Step 3 Migration)
  _DATABASE_PRIVATE_IP: '172.19.81.3' 
  
  # 📍 Cloud SQL Connection Name (สำหรับ Step 4 Cloud Run)
  _CLOUDSQL_INSTANCE: 'carelink-web:asia-southeast1:carelink-db' 
  
  # ☁️ Google Cloud Storage Bucket Name (ใส่ชื่อ Bucket ที่คุณสร้าง)
  _GCS_BUCKET_NAME: 'carelink-images-2026'

  # Strapi Secrets (ควรเก็บใน Secret Manager ในอนาคต)
  _ADMIN_JWT_SECRET: 'your-admin-jwt-secret'
  _JWT_SECRET: 'your-jwt-secret'
