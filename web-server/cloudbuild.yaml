  _TRANSFER_TOKEN_SALT: 'your-transfer-token-salt'
  _APP_KEYS: 'key1,key2,key3,key4'
  _ENCRYPTION_KEY: 'your-encryption-key'
  
  # URLs
  _PUBLIC_URL: 'https://carelink-strapi-290491493302.asia-southeast1.run.app'
  _STRAPI_URL: 'https://carelink-strapi-290491493302.asia-southeast1.run.app'
  _SOCKET_ALLOWED_ORIGINS: '*'
  _TELEGRAM_TOKEN: '8556919848:AAEWut2e_LaEblycNEGI-oOOhFi966IISTs'
